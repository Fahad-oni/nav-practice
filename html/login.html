  <main>
    <div class="container">
      <div class="login-form">
        <h2>LOGIN</h2>
        <p>Sign in to your FreshBasket account and enjoy fresh groceries delivered right to your doorstep.</p>

        
          <form action="#">
            <label for="email">Email</label>
            <input type="email" class="login-email" name="email" placeholder="Enter your email"> <br>

            <label for="password">Password</label>
            <input type="password" class="login-pass" name="password" placeholder="*****" required> <br>

            <button type="submit">LogIn</button>
          </form>
        

      </div>
      <div class="login-img">
        <img src="/images/login.png" alt="login img">
      </div>
    </div>
  </main>
</body>
